name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "src/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          HUSKY: "0"

      - run: pnpm run build
        env:
          VITE_BLOG_API_URL: ${{ secrets.VITE_BLOG_API_URL }}
          VITE_PUBLIC_IMAGE_CDN_URL: ${{ secrets.VITE_PUBLIC_IMAGE_CDN_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
